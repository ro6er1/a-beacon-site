    function revealButtons() {
      var buttons = document.querySelectorAll(".code-block .code-copy[hidden]");
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].hidden = false;
      }
    }
    if (document.readyState === "loading") {

    } else {
      revealButtons();
    }

    function flash(button) {
      var label = button.querySelector(".code-copy-label");
      var previous = label ? label.textContent : null;
      button.classList.add("is-copied");
      if (label) label.textContent = "Copied";
      window.setTimeout(function () {
        button.classList.remove("is-copied");
        if (label && previous !== null) label.textContent = previous;
      }, 2000);
    }

    function legacyCopy(text) {
      var area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "absolute";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      var ok = false;
      try {
        ok = document.execCommand("copy");
      } catch (e) {
        ok = false;
      }
      document.body.removeChild(area);
      return ok;
    }

    function copyFrom(button) {
      var container = button.closest(".code-block");
      if (!container) return;
      var pre = container.querySelector("pre");
      if (!pre) return;
      var source = pre.querySelector("code") || pre;
      var text = source.innerText;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
          function () { flash(button); },
          function () { if (legacyCopy(text)) flash(button); }
        );
      } else if (legacyCopy(text)) {
        flash(button);
      }
    }

    document.addEventListener("click", function (event) {
      var button = event.target.closest(".code-copy");
      if (button) copyFrom(button);
    });
  })();

<script>
  (function () {
    "use strict";
    document.querySelectorAll("form.form-contact").forEach(function (form) {
      var submit = form.querySelector(".form-contact__submit");
      var errorEl = form.querySelector(".form-contact__error");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        errorEl.hidden = true;
        submit.disabled = true;
        var originalValue = submit.value;
        submit.value = "Sending…";
        fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { Accept: "application/json" }
        }).then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          var next = form.getAttribute("data-next");
          if (next) {
            window.location.href = next;
          } else {
            form.innerHTML = '<p class="f4 mt3">Thanks — your message is on its way.</p>';
          }
        }).catch(function () {
          submit.disabled = false;
          submit.value = originalValue;
          errorEl.textContent = "Something went wrong sending the message. Please try again, or email me directly.";
          errorEl.hidden = false;
        });
      });
    });
  })();
</script>

<script>
  (function () {
    "use strict";
    var lightbox = document.getElementById("lightbox");
    if (!lightbox) return;
    var img = lightbox.querySelector(".lightbox__img");
    var videoWrap = lightbox.querySelector(".lightbox__video");
    var iframe = lightbox.querySelector(".lightbox__iframe");
    var closeBtn = lightbox.querySelector(".lightbox__close");

    function open(src, alt, type) {
      if (type === "video") {
        iframe.src = src;
        iframe.title = alt || "";
        videoWrap.style.display = "block";
        img.style.display = "none";
      } else {
        img.src = src;
        img.alt = alt || "";
        img.style.display = "block";
        videoWrap.style.display = "none";
      }
      lightbox.classList.add("is-open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }
    function close() {
      lightbox.classList.remove("is-open");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      img.src = "";
      iframe.src = "";
    }

    document.addEventListener("click", function (e) {
      var trigger = e.target.closest("[data-lightbox]");
      if (trigger) {
        e.preventDefault();
        open(
          trigger.getAttribute("href"),
          trigger.getAttribute("data-alt"),
          trigger.getAttribute("data-type")
        );
        return;
      }
      if (e.target === lightbox || e.target === closeBtn) close();
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && lightbox.classList.contains("is-open")) close();
    });
  })();
</script>
